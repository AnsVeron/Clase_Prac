<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestionar Eventos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="principal">
        <h1 class="titulo">Gestionar eventos</h1>
        <div class="barra-principal">
            <div class="barra-busqueda">
                <input type="text" id="buscador" class="form-control" placeholder="Buscar eventos">
            </div>
            <button id="btnCargar" class="btn btn-secondary">Cargar eventos</button>
        </div>
        <div>
             <form class="formulario-agregar" id="formEvento">
                <input type="text" id="nuevoEvento" class="form-control" placeholder="Nombre del evento">
                <button type="submit" id="btnAgregar" class="btn btn-secondary">Agregar</button>
            </form>
            <br>
        </div>
        <div id="loader" class="loader" style="display:none;">
            <div class="spinner"></div>
        </div>
        <section class="table-section">
            <div class="table-header-row">
                <span>LISTA DE EVENTOS</span>
                <span id="total-label" style="display:none;">Total: <strong id="total">0</strong></span>
            </div>
            <table id="tablaEventos">
                <thead>
                    <tr>
                        <th>Nombre del Evento</th>
                        <th style="text-align: center;">Acciones</th>
                    </tr>
                </thead>
                <tbody id="listaEventos">
                    
                </tbody>
            </table>
        </section>
    </main>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
